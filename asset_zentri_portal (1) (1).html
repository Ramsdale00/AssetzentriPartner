<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssetZentri Partner Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A2733;
    --ink-2: #2D3B49;
    --ink-3: #4A5868;
    --cream: #F4F6F8;
    --cream-2: #E8ECF0;
    --paper: #FFFFFF;
    --line: #E2E6EB;
    --line-2: #CDD3DB;
    --teal: #0F8B8B;
    --teal-deep: #0A6868;
    --rust: #B8542A;
    --gold: #C99536;
    --moss: #4A6B3A;
    --muted: #6B7785;
    --danger: #A8392B;
    --sidebar-bg: #FBFCFD;
    --sidebar-hover: #F1F4F7;
    --sidebar-active: #E8ECF0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter Tight', -apple-system, sans-serif;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .display { font-family: 'Fraunces', serif; letter-spacing: -0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* === Buttons === */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; font-size: 13px; font-weight: 500;
    border-radius: 6px; cursor: pointer; font-family: inherit;
    transition: all 0.15s; border: 1px solid transparent;
  }
  .btn-primary { background: var(--ink); color: white; border-color: var(--ink); }
  .btn-primary:hover { background: var(--ink-2); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover { border-color: var(--ink-3); background: var(--cream); }
  .btn-accent { background: var(--teal); color: white; border-color: var(--teal); }
  .btn-accent:hover { background: var(--teal-deep); }
  .btn-icon {
    background: transparent; border: none; cursor: pointer;
    padding: 6px; color: var(--muted); border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-icon:hover { background: var(--cream); color: var(--ink); }

  /* === Inputs === */
  .input {
    width: 100%; padding: 9px 12px; font-size: 13px;
    border: 1px solid var(--line); border-radius: 6px;
    background: white; font-family: inherit; color: var(--ink);
    transition: border-color 0.15s;
  }
  .input:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(26, 39, 51, 0.08); }
  textarea.input { resize: vertical; min-height: 80px; }
  label.field-label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--ink); margin-bottom: 6px;
  }
  .req { color: var(--rust); }

  /* === Card === */
  .card { background: white; border: 1px solid var(--line); border-radius: 10px; }

  /* === Pills === */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; font-size: 11px; font-weight: 500;
    border-radius: 999px; border: 1px solid; white-space: nowrap;
  }
  .pill-Registered { background: #F4F4EE; color: var(--ink-3); border-color: var(--line); }
  .pill-Qualified { background: #EAF1E8; color: var(--moss); border-color: #B5C9AC; }
  .pill-Demo { background: #FDF2E0; color: var(--gold); border-color: #E8C892; }
  .pill-Proposal { background: #FCE9DC; color: var(--rust); border-color: #E8B496; }
  .pill-Legal { background: #E8E3D2; color: #6B5D2A; border-color: #C9BFA8; }
  .pill-Won { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .pill-Lost { background: #F5DCD6; color: var(--danger); border-color: #D9A89E; }

  /* === Sidebar nav === */
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 14px; font-size: 13px; color: var(--ink-3);
    border-radius: 7px; cursor: pointer; transition: all 0.12s;
    font-weight: 500;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: var(--ink); }
  .nav-item.active { background: var(--sidebar-active); color: var(--ink); font-weight: 600; position: relative; }
  .nav-item.active::before {
    content: ''; width: 3px; height: 14px; background: var(--teal);
    border-radius: 2px; margin-left: -11px; margin-right: 8px;
  }
  .nav-item .badge {
    margin-left: auto; background: var(--rust); color: white;
    font-size: 10px; padding: 1px 7px; border-radius: 999px;
    font-weight: 600;
  }

  /* === Tables === */
  table.data-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .data-table th {
    text-align: left; padding: 11px 16px; font-size: 11px;
    font-weight: 600; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.06em; border-bottom: 1px solid var(--line);
    background: #FAFBFC;
  }
  .data-table td {
    padding: 14px 16px; border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  .data-table tr.clickable { cursor: pointer; }
  .data-table tr.clickable:hover td { background: var(--cream); }
  .data-table tr:last-child td { border-bottom: none; }

  /* === Modal === */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26, 39, 51, 0.45);
    backdrop-filter: blur(4px);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 24px; animation: fadeIn 0.2s;
  }
  .modal {
    background: var(--paper); border-radius: 12px; width: 100%;
    max-width: 640px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 24px 64px rgba(26, 39, 51, 0.25);
  }
  .modal-head {
    padding: 22px 28px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-body { padding: 28px; }
  .modal-foot {
    padding: 18px 28px; border-top: 1px solid var(--line);
    display: flex; gap: 10px; justify-content: flex-end;
    background: #FAFBFC; border-radius: 0 0 12px 12px;
  }

  /* === Animations === */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.4s cubic-bezier(0.2, 0, 0, 1) both; }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

  /* === Scrollbar === */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

  /* === Login page === */
  .login-page {
    min-height: 100vh; display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--paper);
  }
  @media (max-width: 880px) {
    .login-page { grid-template-columns: 1fr; }
    .login-pane-art { display: none !important; }
  }
  .login-pane-form {
    display: flex; align-items: center; justify-content: center;
    padding: 48px;
  }
  .login-pane-art {
    background: var(--ink);
    color: white; padding: 48px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .login-pane-art::before {
    content: ''; position: absolute;
    top: -50%; right: -30%; width: 800px; height: 800px;
    background: radial-gradient(circle, var(--teal) 0%, transparent 70%);
    opacity: 0.18;
  }
  .login-pane-art::after {
    content: ''; position: absolute;
    bottom: -40%; left: -20%; width: 600px; height: 600px;
    background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
    opacity: 0.10;
  }
  .login-form { max-width: 380px; width: 100%; }
  .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
  .login-logo-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--ink); color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    font-family: 'Fraunces', serif;
  }
  .login-credentials {
    background: #FFF8E8; border: 1px solid #E8D8A0;
    border-radius: 8px; padding: 14px 16px; margin-top: 16px;
    font-size: 12px; position: relative; z-index: 1;
  }
  .login-credentials-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    font-weight: 600; color: #7A5F00; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .login-credentials .row {
    display: flex; justify-content: space-between; margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink);
  }
  .login-credentials .row:last-child { margin-bottom: 0; }
  .login-credentials .clickable-cred {
    cursor: pointer; padding: 4px 0; border-radius: 4px;
    transition: background 0.15s;
  }
  .login-credentials .clickable-cred:hover { background: rgba(0,0,0,0.04); padding: 4px 6px; margin: 0 -6px; }

  .quote-block {
    position: relative; z-index: 1;
    font-family: 'Fraunces', serif; font-size: 32px;
    line-height: 1.2; font-weight: 400; letter-spacing: -0.02em;
    max-width: 440px;
  }
  .quote-block::before {
    content: '\u201C'; display: block; font-size: 80px;
    line-height: 0.8; opacity: 0.4; margin-bottom: 16px;
  }
  .quote-byline {
    margin-top: 24px; font-family: 'Inter Tight', sans-serif;
    font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 500;
  }
  .art-footer {
    position: relative; z-index: 1;
    display: flex; gap: 32px;
    font-size: 12px; color: rgba(255,255,255,0.7);
  }
  .art-footer .stat-num { color: white; font-weight: 600; font-size: 20px; font-family: 'JetBrains Mono', monospace; display: block; margin-bottom: 2px;}

  /* === Generic === */
  .empty-state {
    padding: 48px 22px; text-align: center;
    color: var(--muted); font-size: 14px;
  }
  .stage-tracker {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .stage-btn {
    padding: 4px 10px; font-size: 11px; font-weight: 500;
    border: 1px solid var(--line); background: white; cursor: pointer;
    border-radius: 999px; transition: all 0.15s; font-family: inherit;
    color: var(--ink-3);
  }
  .stage-btn:hover { border-color: var(--ink-3); }
  .stage-btn.current {
    border-color: var(--ink); background: var(--ink); color: white;
    font-weight: 600;
  }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink); color: white;
    padding: 12px 18px; border-radius: 8px;
    font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    z-index: 200; animation: fadeUp 0.3s;
    display: flex; align-items: center; gap: 10px;
  }

  /* === Search trigger in sidebar === */
  .search-trigger {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; margin-bottom: 14px;
    background: white; border: 1px solid var(--line);
    border-radius: 7px; cursor: pointer; font-family: inherit;
    font-size: 13px; color: var(--ink-3);
    transition: all 0.15s;
  }
  .search-trigger:hover { border-color: var(--line-2); background: var(--cream); }
  .kbd {
    font-family: 'JetBrains Mono', monospace;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
  }

  /* === Search modal === */
  .search-backdrop {
    position: fixed; inset: 0;
    background: rgba(26, 39, 51, 0.45);
    backdrop-filter: blur(4px);
    z-index: 110;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 80px 24px 24px 24px;
    animation: fadeIn 0.15s;
  }
  .search-modal {
    background: var(--paper); border-radius: 12px;
    width: 100%; max-width: 600px; max-height: 70vh;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 64px rgba(26, 39, 51, 0.3);
    overflow: hidden;
  }
  .search-input-wrap {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
  }
  .search-input-wrap .search-icon { color: var(--muted); }
  .search-input {
    flex: 1; border: none; outline: none;
    font-size: 16px; font-family: inherit; color: var(--ink);
    background: transparent;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-results {
    flex: 1; overflow-y: auto; padding: 8px 0;
  }
  .search-group {
    padding: 4px 0 8px 0;
  }
  .search-group-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--muted);
    font-weight: 600; padding: 8px 20px;
  }
  .search-result {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 20px; cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }
  .search-result:hover, .search-result.highlighted {
    background: var(--cream);
    border-left-color: var(--ink);
  }
  .search-result-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--cream);
    color: var(--ink-3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .search-result.highlighted .search-result-icon {
    background: var(--ink); color: white;
  }
  .search-result-content { flex: 1; min-width: 0; }
  .search-result-title {
    font-size: 13px; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .search-result-meta {
    font-size: 11px; color: var(--muted);
    margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .search-result-action {
    font-size: 11px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .search-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--line);
    background: #FAFBFC;
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted);
  }
  .search-footer .kbd { font-size: 9px; }
  .search-empty {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 13px;
  }
  mark.match {
    background: #FFF1B8;
    color: var(--ink);
    padding: 1px 0;
    font-weight: 600;
    border-radius: 2px;
  }

  /* Icons via inline SVG sizing */
  .icon { width: 16px; height: 16px; flex-shrink: 0; }
  .icon-sm { width: 14px; height: 14px; flex-shrink: 0; }
  .icon-lg { width: 22px; height: 22px; flex-shrink: 0; }
</style>
</head>

<div id="app"></div>

/* ============================================================
   APP STATE — persisted in localStorage
   ============================================================ */
const STORAGE_KEY = 'zc_portal_state_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // migrations: ensure newer fields exist
      if (!parsed.customPartners) parsed.customPartners = [];
      if (parsed.selectedPartnerId === undefined) parsed.selectedPartnerId = null;
      return parsed;
    }
  } catch (e) {}
  return {
    auth: null,
    view: 'dashboard',
    selectedDealId: null,
    selectedPartnerId: null,
    activeFolder: COLLATERALS[0].folder,
    checklist: SEED_CHECKLIST,
    deals: SEED_DEALS,
    team: SEED_TEAM,
    customPartners: [],
  };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function resetData() {
  if (!confirm('Reset all demo data back to seeds?')) return;
  state.checklist = JSON.parse(JSON.stringify(SEED_CHECKLIST));
  state.deals = JSON.parse(JSON.stringify(SEED_DEALS));
  state.team = JSON.parse(JSON.stringify(SEED_TEAM));
  state.selectedDealId = null;
  state.view = state.auth?.persona === 'admin' ? 'admin' : 'dashboard';
  saveState(); render(); toast('Demo data reset to seeds.');
}

let state = loadState();

/* ============================================================
   UTILS
   ============================================================ */
function annualValue(deal) {
  return deal.devices * (deal.tier === 'Premium' ? 8 : 4) * 12;
}
function fmtCurrency(n) {
  if (n >= 1000) return '$' + (n / 1000).toFixed(1) + 'K';
  return '$' + n;
}
function fmtCurrencyShort(n) {
  if (n >= 1000) return '$' + Math.round(n / 1000) + 'K';
  return '$' + n;
}
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = I.checkCircle + '<span>' + escapeHtml(msg) + '</span>';
  document.body.appendChild(t);
  setTimeout(() => t.style.opacity = '0', 2400);
  setTimeout(() => t.remove(), 2800);
}
function stagePillClass(stage) {
  const map = { 'Registered':'pill-Registered','Qualified':'pill-Qualified','Demo':'pill-Demo','Proposal':'pill-Proposal','Legal':'pill-Legal','Won':'pill-Won','Lost':'pill-Lost' };
  return map[stage] || 'pill-Registered';
}
function stageLabel(stage) {
  return { 'Demo':'Demo Scheduled','Legal':'Legal Review','Won':'Closed-Won','Lost':'Closed-Lost' }[stage] || stage;
}

  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  const user = USERS[email];
  const err = document.getElementById('login-error');

  if (!user || user.password !== password) {

    email,

    partnerName: user.partnerName,
    partnerTier: user.partnerTier,

  saveState();
  render();
  toast('Welcome back, ' + user.name.split(' ')[0] + '.');
}

          <div style="padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">Pipeline</div>
              <div class="display" style="font-size:20px;font-weight:500;margin-top:2px;">Your active deals</div>

            <button class="btn btn-ghost" onclick="navigate('leads')">View all ${I.arrowRight}</button>
          </div>
          ${active.length === 0 ? `<div class="empty-state">No active deals yet. <div style="margin-top:14px;"><button class="btn btn-primary" onclick="navigate('leads')">${I.plus} Register your first lead</button></div></div>` : `
            <table class="data-table">
              <thead><tr><th>Deal ID</th><th>Company</th><th>Stage</th><th style="text-align:right;">Value</th></tr></thead>
              <tbody>
                ${active.slice(0,5).map(d => `
                  <tr class="clickable" onclick="openDeal('${d.id}')">

                    <td style="font-weight:500;">${escapeHtml(d.company)}</td>
                    <td><span class="pill ${stagePillClass(d.stage)}">${stageLabel(d.stage)}</span></td>

        <div style="display:flex;flex-direction:column;gap:20px;">
          ${completed < 8 ? `
            <div class="card fade-up" style="padding:22px;background:linear-gradient(135deg, var(--cream) 0%, var(--cream-2) 100%);border-color:var(--line-2);">
              <div style="font-size:11px;color:var(--rust);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">Action required</div>

              <button class="btn btn-primary" style="margin-top:16px;width:100%;justify-content:center;" onclick="navigate('onboarding')">

          <div class="card fade-up">
            <div style="padding:18px 22px;border-bottom:1px solid var(--line);">

              <div class="display" style="font-size:18px;font-weight:500;margin-top:2px;">From Vistrive</div>
            </div>
            <div style="padding:22px;">
              <div style="display:flex;gap:12px;align-items:flex-start;">
                <div style="width:36px;height:36px;border-radius:8px;background:var(--rust);color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                  ${I.megaphone}
                </div>
                <div>
                  <div style="font-weight:500;font-size:14px;">Q3 pricing refresh &mdash; live now</div>
                  <div style="color:var(--muted);font-size:13px;margin-top:4px;line-height:1.5;">Updated subscription tiers PDF available in Pricing &amp; Tiers folder.</div>
                  <button class="btn btn-ghost" style="margin-top:12px;" onclick="navigate('collateral'); state.activeFolder='Pricing &amp; Tiers'; saveState();">Open collateral</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function statCard(label, value, hint, accent) {
  return `
    <div class="card" style="padding:20px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:${accent};"></div>
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">${label}</div>
      <div class="display mono" style="font-size:30px;font-weight:500;margin-top:8px;line-height:1;color:${accent};">${value}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;">${hint}</div>
    </div>
  `;
}

/* ============================================================
   ONBOARDING
   ============================================================ */
function renderOnboarding() {
  const completed = state.checklist.filter(c => c.done).length;
  const pct = (completed / 8) * 100;

  return `
    <div style="padding:36px;max-width:880px;">
      <div class="fade-up" style="margin-bottom:32px;">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:6px;">Module 1</div>
        <h1 class="display" style="font-size:38px;font-weight:500;margin:0;line-height:1.1;">Get ready to sell.</h1>
        <p style="color:var(--muted);font-size:15px;margin-top:8px;max-width:600px;">
          Eight steps. Complete them all to unlock lead registration. You can save and return at any time.
        </p>
        <div style="margin-top:28px;background:white;border:1px solid var(--line);border-radius:10px;padding:16px 22px;display:flex;align-items:center;gap:20px;">
          <div style="flex:1;">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
              <span style="font-size:13px;font-weight:500;">Progress</span>
              <span class="mono" style="font-size:13px;color:var(--muted);">${completed} / 8</span>
            </div>
            <div style="background:var(--cream);border-radius:4px;height:8px;overflow:hidden;">
              <div style="background:${completed === 8 ? 'var(--moss)' : 'var(--ink)'};height:100%;width:${pct}%;transition:width 0.4s, background 0.4s;"></div>
            </div>
          </div>
          ${completed === 8 ? `<div class="pill" style="background:var(--moss);color:white;border-color:var(--moss);">${I.checkCircle} ACTIVE PARTNER</div>` : ''}
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;" class="fade-up">
        ${state.checklist.map((s, i) => `
          <div class="card" style="padding:18px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all 0.15s;background:${s.done ? 'var(--cream)' : 'white'};border-color:${s.done ? 'var(--line-2)' : 'var(--line)'};"
               onclick="toggleStep(${s.id})"
               onmouseenter="this.style.transform='translateX(2px)'"
               onmouseleave="this.style.transform='translateX(0)'">
            <div style="width:32px;height:32px;border-radius:8px;background:${s.done ? 'var(--ink)' : 'white'};color:${s.done ? 'white' : 'var(--muted)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;border:${s.done ? 'none' : '1px solid var(--line)'};transition:all 0.2s;">
              ${s.done ? I.check : `<span class="mono" style="font-size:13px;font-weight:600;">${i+1}</span>`}
            </div>
            <div style="flex:1;">
              <div style="font-weight:500;font-size:14px;text-decoration:${s.done ? 'line-through' : 'none'};color:${s.done ? 'var(--muted)' : 'var(--ink)'};">${escapeHtml(s.title)}</div>
              <div style="font-size:13px;color:var(--muted);margin-top:2px;">${escapeHtml(s.desc)}</div>
            </div>
            <div style="color:${s.done ? 'var(--moss)' : 'var(--muted)'};font-size:12px;font-weight:500;">${s.done ? 'Done' : 'Mark complete'}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function toggleStep(id) {
  const step = state.checklist.find(s => s.id === id);
  if (step) {
    step.done = !step.done;
    saveState();
    render();
    if (state.checklist.every(s => s.done)) {
      toast('Onboarding complete! Lead registration unlocked.');
    }
  }
}

/* ============================================================
   LEADS — list + detail + register modal
   ============================================================ */
let leadFilter = 'All';
let leadSearch = '';

function renderLeads() {
  if (state.selectedDealId) {
    const deal = state.deals.find(d => d.id === state.selectedDealId);
    if (deal) return renderDealDetail(deal);
  }

  const onboardingComplete = state.checklist.every(s => s.done);
  const filtered = state.deals.filter(d => {
    if (leadFilter === 'Active' && ['Won','Lost'].includes(d.stage)) return false;
    if (leadFilter === 'Won' && d.stage !== 'Won') return false;
    if (leadSearch && !d.company.toLowerCase().includes(leadSearch.toLowerCase())) return false;
    return true;
  });

  return `
    <div style="padding:36px;max-width:1200px;">
      <div class="fade-up" style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;">
        <div>
          <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:6px;">Module 2</div>
          <h1 class="display" style="font-size:38px;font-weight:500;margin:0;line-height:1.1;">Lead Registration.</h1>
          <p style="color:var(--muted);font-size:15px;margin-top:8px;max-width:560px;">Claim a customer. 90-day protection from the moment you submit.</p>
        </div>
        <button class="btn btn-primary" ${!onboardingComplete ? 'disabled title="Complete onboarding first"' : ''} onclick="openRegisterModal()">
          ${I.plus} Register lead
        </button>
      </div>

      ${!onboardingComplete ? `
        <div class="card fade-up" style="padding:16px;margin-bottom:24px;background:var(--cream);border-color:var(--line-2);display:flex;gap:12px;align-items:center;">
          <div style="color:var(--rust);">${I.alert}</div>
          <div style="font-size:13px;">Complete onboarding to unlock lead registration. Browsing existing deals is fine in the meantime.</div>
        </div>
      ` : ''}

      <div class="fade-up" style="display:flex;gap:12px;margin-bottom:18px;align-items:center;">
        <div style="position:relative;flex:1;max-width:320px;">
          <div style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);">${I.search}</div>
          <input class="input" placeholder="Search by company..." value="${escapeHtml(leadSearch)}" oninput="leadSearch = this.value; renderMainOnly();" style="padding-left:34px;">
        </div>
        <div style="display:flex;background:var(--cream);border-radius:7px;padding:3px;gap:2px;">
          ${['All','Active','Won'].map(f => `
            <button onclick="leadFilter='${f}'; renderMainOnly();" style="background:${leadFilter===f ? 'white' : 'transparent'};color:${leadFilter===f ? 'var(--ink)' : 'var(--muted)'};border:none;padding:6px 14px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;${leadFilter===f ? 'box-shadow:0 1px 2px rgba(0,0,0,0.06);' : ''}">${f}</button>
          `).join('')}
        </div>
      </div>

      <div class="card fade-up">
        <table class="data-table">
          <thead>
            <tr>
              <th>Deal ID</th><th>Company</th><th>Country</th>
              <th>Tier / Devices</th><th>Stage</th>
              <th>Protection</th><th style="text-align:right;">Value</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0 ? `<tr><td colspan="7" class="empty-state">No deals match.</td></tr>` : filtered.map(d => `
              <tr class="clickable" onclick="openDeal('${d.id}')">
                <td class="mono" style="font-size:12px;color:var(--muted);">${d.id}</td>
                <td style="font-weight:500;">${escapeHtml(d.company)}</td>
                <td style="color:var(--muted);">${escapeHtml(d.country)}</td>
                <td><span style="font-weight:500;">${d.tier}</span> <span class="mono" style="color:var(--muted);margin-left:8px;font-size:12px;">${d.devices} devices</span></td>
                <td><span class="pill ${stagePillClass(d.stage)}">${stageLabel(d.stage)}</span></td>
                <td class="mono" style="font-size:12px;color:${d.protectionDays < 14 && !['Won','Lost'].includes(d.stage) ? 'var(--rust)' : 'var(--muted)'};">
                  ${['Won','Lost'].includes(d.stage) ? '\u2014' : d.protectionDays + ' days'}
                </td>
                <td class="mono" style="text-align:right;font-weight:500;">${fmtCurrency(annualValue(d))}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderMainOnly() {
  document.querySelector('main').innerHTML = renderLeads();
}

function openDeal(id) {
  state.selectedDealId = id;
  saveState();
  render();
}

function renderDealDetail(deal) {
  const value = annualValue(deal);
  const stages = ['Registered','Qualified','Demo','Proposal','Legal','Won','Lost'];

  return `
    <div style="padding:36px;max-width:1000px;">
      <button class="btn btn-ghost fade-up" onclick="state.selectedDealId=null;saveState();render();" style="margin-bottom:24px;">
        ${I.arrowLeft} Back to deals
      </button>

      <div class="fade-up" style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;">
        <div>
          <div class="mono" style="font-size:12px;color:var(--muted);">${deal.id}</div>
          <h1 class="display" style="font-size:34px;font-weight:500;margin:4px 0 0 0;line-height:1.1;">${escapeHtml(deal.company)}</h1>
          <div style="color:var(--muted);margin-top:6px;font-size:14px;">${escapeHtml(deal.country)} &middot; Registered ${deal.registered}</div>
        </div>
        <div style="text-align:right;">
          <div class="mono display" style="font-size:28px;font-weight:500;">${fmtCurrency(value)}</div>
          <div style="font-size:12px;color:var(--muted);">indicative annual value</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;">
        <div style="display:flex;flex-direction:column;gap:20px;">
          <div class="card fade-up" style="padding:22px;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:16px;">Pipeline stage</div>
            <div class="stage-tracker">
              ${stages.map(s => `
                <button class="stage-btn ${deal.stage===s ? 'current' : ''}" onclick="updateStage('${deal.id}','${s}')">
                  ${stageLabel(s)}
                </button>
              `).join('')}
            </div>
            <div style="margin-top:14px;font-size:12px;color:var(--muted);">Click to advance the deal. Vistrive AE is auto-notified.</div>
          </div>

          <div class="card fade-up">
            <div style="padding:18px 22px;border-bottom:1px solid var(--line);">
              <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">Conversation</div>
              <div class="display" style="font-size:18px;font-weight:500;margin-top:2px;">Notes with Vistrive</div>
            </div>
            <div style="padding:22px;display:flex;flex-direction:column;gap:14px;">
              ${deal.comments.length === 0 ? `<div style="font-size:13px;color:var(--muted);font-style:italic;">No notes yet. Start a conversation.</div>` : deal.comments.map(c => `
                <div style="display:flex;gap:12px;">
                  <div style="width:30px;height:30px;border-radius:8px;flex-shrink:0;background:${c.author==='You' ? 'var(--ink)' : 'var(--teal)'};color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;">
                    ${c.author === 'You' ? 'Y' : 'V'}
                  </div>
                  <div style="flex:1;">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;">
                      <span style="font-size:13px;font-weight:500;">${escapeHtml(c.author)}</span>
                      <span style="font-size:11px;color:var(--muted);">${escapeHtml(c.when)}</span>
                    </div>
                    <div style="font-size:13px;margin-top:4px;line-height:1.5;">${escapeHtml(c.text)}</div>
                  </div>
                </div>
              `).join('')}
              <div style="display:flex;gap:8px;margin-top:8px;">
                <input class="input" id="comment-input" placeholder="Add a note..." onkeydown="if(event.key==='Enter') postComment('${deal.id}')">
                <button class="btn btn-primary" onclick="postComment('${deal.id}')">${I.send}</button>
              </div>
            </div>
          </div>
        </div>

        <div class="card fade-up" style="padding:22px;height:fit-content;">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:16px;">Deal details</div>
          ${dealRow(I.building, 'Contact', deal.contact)}
          ${dealRow(I.mail, 'Email', deal.email)}
          ${dealRow(I.mapPin, 'Country', deal.country)}
          ${dealRow(I.hash, 'Devices', deal.devices + ' \u00d7 ' + deal.tier)}
          ${dealRow(I.calendar, 'Expected close', deal.closeDate)}
          ${dealRow(I.shield, 'Protection', ['Won','Lost'].includes(deal.stage) ? 'Closed' : deal.protectionDays + ' days left', deal.protectionDays < 14 && !['Won','Lost'].includes(deal.stage) ? 'var(--rust)' : null)}
          ${deal.notes ? `
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line);">
              <div style="font-size:11px;color:var(--muted);font-weight:500;margin-bottom:6px;">Initial notes</div>
              <div style="font-size:13px;line-height:1.5;color:var(--ink-3);">${escapeHtml(deal.notes)}</div>
            </div>
          ` : ''}
        </div>
      </div>
    </div>
  `;
}

function dealRow(icon, label, value, accent) {
  return `
    <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;">
      <div style="color:var(--muted);margin-top:2px;flex-shrink:0;">${icon}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:11px;color:var(--muted);font-weight:500;">${label}</div>
        <div style="font-size:13px;margin-top:2px;color:${accent || 'var(--ink)'};font-weight:500;word-break:break-word;">${escapeHtml(value)}</div>
      </div>
    </div>
  `;
}

function updateStage(id, stage) {
  const deal = state.deals.find(d => d.id === id);
  if (deal) {
    deal.stage = stage;
    saveState(); render();
    toast('Stage updated to ' + stageLabel(stage));
  }
}

function postComment(id) {
  const input = document.getElementById('comment-input');
  if (!input || !input.value.trim()) return;
  const deal = state.deals.find(d => d.id === id);
  if (deal) {
    deal.comments.push({ author: 'You', text: input.value.trim(), when: 'just now' });
    saveState(); render();
  }
}

/* === Register modal === */
function openRegisterModal() {
  if (!state.checklist.every(s => s.done)) {
    toast('Complete onboarding first.');
    return;
  }
  const m = document.createElement('div');
  m.className = 'modal-backdrop';
  m.id = 'register-modal';
  m.onclick = (e) => { if (e.target === m) m.remove(); };
  m.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <div>
          <div class="display" style="font-size:22px;font-weight:500;">Register a lead</div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px;">90-day protection begins on submission</div>
        </div>
        <button class="btn-icon" onclick="document.getElementById('register-modal').remove()">${I.x}</button>
      </div>
      <div class="modal-body" id="register-body">
        <div style="margin-bottom:16px;">
          <label class="field-label">End Customer company name <span class="req">*</span></label>
          <input class="input" id="reg-company" oninput="checkConflict()" placeholder="e.g. Acme Manufacturing Ltd">
        </div>
        <div id="conflict-warning" style="display:none;background:#FCE9E5;border:1px solid #E8B4A8;color:var(--danger);padding:12px;border-radius:7px;font-size:13px;margin-bottom:16px;"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">
          <div>
            <label class="field-label">Country <span class="req">*</span></label>
            <select class="input" id="reg-country">
              <option>United Kingdom</option><option>United States</option><option>Germany</option><option>France</option><option>India</option><option>Singapore</option><option>Australia</option><option>Canada</option><option>Netherlands</option>
            </select>
          </div>
          <div>
            <label class="field-label">Source <span class="req">*</span></label>
            <select class="input" id="reg-source">
              <option>Partner network</option><option>Outbound</option><option>Inbound</option><option>Event</option><option>Referral</option>
            </select>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">
          <div>
            <label class="field-label">Primary contact name <span class="req">*</span></label>
            <input class="input" id="reg-contact">
          </div>
          <div>
            <label class="field-label">Email <span class="req">*</span></label>
            <input class="input" id="reg-email" type="email">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px;">
          <div>
            <label class="field-label">Devices <span class="req">*</span></label>
            <input class="input mono" id="reg-devices" type="number" oninput="updateRegValue()" placeholder="200">
          </div>
          <div>
            <label class="field-label">Target tier <span class="req">*</span></label>
            <select class="input" id="reg-tier" onchange="updateRegValue()">
              <option>Standard</option><option>Premium</option>
            </select>
          </div>
          <div>
            <label class="field-label">Expected close <span class="req">*</span></label>
            <input class="input" id="reg-date" type="date">
          </div>
        </div>

        <div id="reg-value" style="background:var(--cream);padding:12px 16px;border-radius:7px;font-size:13px;display:none;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <span style="color:var(--muted);">Indicative annual value</span>
          <span class="mono" style="font-weight:600;font-size:16px;" id="reg-value-num">$0</span>
        </div>

        <div>
          <label class="field-label">Notes <span style="color:var(--muted);font-weight:400;">(optional)</span></label>
          <textarea class="input" id="reg-notes" rows="3" placeholder="Qualification context, BANT summary, anything useful"></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="document.getElementById('register-modal').remove()">Cancel</button>
        <button class="btn btn-primary" id="reg-submit" onclick="submitRegister()" disabled>${I.shield} Register &amp; claim protection</button>
      </div>
    </div>
  `;
  document.body.appendChild(m);
  setTimeout(() => document.getElementById('reg-company').focus(), 50);
}

function checkConflict() {
  const company = document.getElementById('reg-company').value.trim();
  const warning = document.getElementById('conflict-warning');
  const submit = document.getElementById('reg-submit');
  if (company.length > 2) {
    const match = state.deals.find(d => d.company.toLowerCase().includes(company.toLowerCase()) || company.toLowerCase().includes(d.company.toLowerCase()));
    if (match) {
      warning.innerHTML = '<strong>Conflict detected.</strong> A lead matching "' + escapeHtml(match.company) + '" is already claimed. Contact your Partner Success Manager if you believe this is an error.';
      warning.style.display = 'block';
      submit.disabled = true;
      return;
    }
  }
  warning.style.display = 'none';
  validateRegForm();
}

function validateRegForm() {
  const required = ['reg-company','reg-contact','reg-email','reg-devices','reg-date'];
  const filled = required.every(id => document.getElementById(id).value.trim());
  const conflict = document.getElementById('conflict-warning').style.display !== 'none';
  document.getElementById('reg-submit').disabled = !filled || conflict;
}

function updateRegValue() {
  const devices = parseInt(document.getElementById('reg-devices').value) || 0;
  const tier = document.getElementById('reg-tier').value;
  const v = devices * (tier === 'Premium' ? 8 : 4) * 12;
  const box = document.getElementById('reg-value');
  if (v > 0) {
    box.style.display = 'flex';
    document.getElementById('reg-value-num').textContent = '$' + v.toLocaleString();
  } else {
    box.style.display = 'none';
  }
  validateRegForm();
}

function submitRegister() {
  const data = {
    id: 'DR-' + (1100 + state.deals.length + Math.floor(Math.random()*50)),
    company: document.getElementById('reg-company').value.trim(),
    country: document.getElementById('reg-country').value,
    contact: document.getElementById('reg-contact').value.trim(),
    email: document.getElementById('reg-email').value.trim(),
    phone: '',
    devices: parseInt(document.getElementById('reg-devices').value),
    tier: document.getElementById('reg-tier').value,
    closeDate: document.getElementById('reg-date').value,
    stage: 'Registered',
    source: document.getElementById('reg-source').value,
    notes: document.getElementById('reg-notes').value.trim(),
    registered: new Date().toISOString().slice(0, 10),
    protectionDays: 90,
    comments: [],
  };
  state.deals.push(data);
  saveState();
  document.getElementById('register-modal').remove();
  render();
  toast('Lead registered. Protection: 90 days.');
}

function getAllPartners() {
  // Merge seeded directory with admin-created partners. Custom partners get isCustom flag.
  return [
    ...PARTNER_DIRECTORY,
    ...state.customPartners.map(p => ({ ...p, isCustom: true })),
  ];
}

function getPartnerData(p) {
  // For the current user partner, pull live data from state
  if (p.isCurrentUser) {
    return {
      ...p,
      team: state.team,
      deals: state.deals,
      onboarding: state.checklist.filter(c => c.done).length,
    };
  }
  return p;
}

function partnerStats(p) {
  const data = getPartnerData(p);
  const active = data.deals.filter(d => !['Won','Lost'].includes(d.stage));
  const won = data.deals.filter(d => d.stage === 'Won');
  const annualPipeline = active.reduce((s,d) => s + (d.devices * (d.tier === 'Premium' ? 8 : 4) * 12), 0);
  const wonValue = won.reduce((s,d) => s + (d.devices * (d.tier === 'Premium' ? 8 : 4) * 12), 0);
  return {
    members: data.team.length,
    deals: data.deals.length,
    activeDeals: active.length,
    wonDeals: won.length,
    annualPipeline,
    wonValue,
    mrr: annualPipeline / 12,
    onboarding: data.onboarding,
  };
}

function cpUpdate(key, value) {
  createPartnerData[key] = value;
}

function validateCpStep1() {
  const d = createPartnerData;
  const filled = d.name.trim() && d.contactName.trim() && d.contactEmail.trim();

  // Conflict check — same name as existing partner?
  const allPartners = getAllPartners();
  const conflict = d.name.trim().length > 2 && allPartners.find(p =>
    p.name.toLowerCase().includes(d.name.trim().toLowerCase()) ||
    d.name.trim().toLowerCase().includes(p.name.toLowerCase())
  );
  const conflictBox = document.getElementById('cp-name-conflict');
  if (conflict) {
    conflictBox.style.display = 'block';
    conflictBox.innerHTML = '<strong>Name conflict.</strong> "' + escapeHtml(conflict.name) + '" is already in your partner directory.';
  } else {
    conflictBox.style.display = 'none';
  }

  // Email conflict check
  const emailConflict = d.contactEmail.trim() && allPartners.find(p => p.contact && p.contact.email.toLowerCase() === d.contactEmail.trim().toLowerCase());

  document.getElementById('cp-next').disabled = !filled || !!conflict || !!emailConflict;
}

function cpGoToStep2() {
  createPartnerStep = 2;
  renderCreatePartnerModal();
}

function cpBackToStep1() {
  createPartnerStep = 1;
  renderCreatePartnerModal();
}

function cpAddExtra() {
  const name = document.getElementById('cp-extra-name').value.trim();
  const email = document.getElementById('cp-extra-email').value.trim();
  const role = document.getElementById('cp-extra-role').value;
  if (!name || !email) {
    toast('Name and email required.');
    return;
  }
  // Check duplicate within additional users
  if (createPartnerData.additionalUsers.find(u => u.email.toLowerCase() === email.toLowerCase()) ||
      email.toLowerCase() === createPartnerData.contactEmail.toLowerCase()) {
    toast('That email is already on the list.');
    return;
  }
  createPartnerData.additionalUsers.push({ name, email, role });
  renderCreatePartnerModal();
  // refocus the name input for fast bulk-add
  setTimeout(() => {
    const el = document.getElementById('cp-extra-name');
    if (el) el.focus();
  }, 60);
}

function cpRemoveExtra(i) {
  createPartnerData.additionalUsers.splice(i, 1);
  renderCreatePartnerModal();
}

function cpSubmit() {
  const d = createPartnerData;
  const id = 'p-custom-' + Date.now();
  const today = new Date().toISOString().slice(0, 10);

  // Build the new partner record matching PARTNER_DIRECTORY shape
  const newPartner = {
    id,
    name: d.name.trim(),
    tier: d.tier,
    country: d.country,
    psm: d.psm,
    joined: today,
    contact: {
      name: d.contactName.trim(),
      email: d.contactEmail.trim(),
      phone: d.contactPhone.trim() || '—',
    },
    team: [
      { name: d.contactName.trim(), email: d.contactEmail.trim(), role: 'Admin', status: 'Invited' },
      ...d.additionalUsers.map(u => ({ ...u, status: 'Invited' })),
    ],
    onboarding: 0,
    deals: [],
  };

  state.customPartners.push(newPartner);
  saveState();
  closeCreatePartner();
  toast(d.name + ' added. Invitation emails sent.');

  // Jump straight to the new partner's detail page
  openPartner(id);
}

function adminSubmitInvite(partnerId) {
  const name = document.getElementById('ai-name').value.trim();
  const email = document.getElementById('ai-email').value.trim();
  const role = document.getElementById('ai-role').value;
  if (!name || !email) { toast('Name and email required.'); return; }

  // Find partner — custom partners only for now (seed partners are immutable)
  const custom = state.customPartners.find(p => p.id === partnerId);
  if (custom) {
    custom.team.push({ name, email, role, status: 'Invited' });
    saveState();
    document.getElementById('admin-invite-modal').remove();
    render();
    toast('Invitation sent to ' + email);

    toast('Cannot modify seeded partners in this demo.');

}

   GLOBAL SEARCH

let searchQuery = '';
let searchHighlight = 0;
let searchResultsCache = [];

function buildSearchIndex() {
  const auth = state.auth;
  if (!auth) return [];
  const isAdmin = auth.persona === 'admin';
  const items = [];

  // Static nav targets
  if (!isAdmin) {
    items.push(
      { type: 'page', icon: I.dashboard, title: 'Dashboard', meta: 'Module · Pipeline + onboarding summary', view: 'dashboard', keywords: 'home overview welcome' },
      { type: 'page', icon: I.checkSquare, title: 'Onboarding', meta: 'Module 1 · 8-step checklist', view: 'onboarding', keywords: 'setup checklist progress steps quiz' },
      { type: 'page', icon: I.hash, title: 'Lead Registration', meta: 'Module 2 · Pipeline list', view: 'leads', keywords: 'deals pipeline register claim protection' },
      { type: 'page', icon: I.folder, title: 'Product Collaterals', meta: 'Module 3 · Searchable library', view: 'collateral', keywords: 'playbooks battlecards docs cobrand' },
      { type: 'page', icon: I.users, title: 'Team', meta: 'User management', view: 'team', keywords: 'invite members admin seller users roles' },
    );
  } else {
    items.push(
      { type: 'page', icon: I.chart, title: 'Operations', meta: 'Admin · Dashboard', view: 'admin', keywords: 'dashboard pipeline overview' },
      { type: 'page', icon: I.hash, title: 'All Deals', meta: 'Admin · Every deal across partners', view: 'admin-deals', keywords: 'deals pipeline registrations' },
      { type: 'page', icon: I.users, title: 'Partners', meta: 'Admin · 20-partner directory', view: 'admin-partners', keywords: 'partners directory tier onboarding' },
    );
  }

  // Deals — partner sees own, admin sees own seed + all partner deals
  const allDeals = isAdmin
    ? getAllPartners().flatMap(p => getPartnerData(p).deals.map(d => ({ ...d, partnerName: p.name, partnerId: p.id })))
    : state.deals.map(d => ({ ...d, partnerName: state.auth.partnerName }));
  allDeals.forEach(d => {
    items.push({
      type: 'deal',
      icon: I.hash,
      title: d.company,
      meta: d.id + ' · ' + (d.contact || d.partnerName || '') + ' · ' + (d.country || ''),
      view: 'leads',
      dealId: d.id,
      partnerId: d.partnerId,
      keywords: [d.id, d.company, d.country || '', d.contact || '', d.stage, d.tier, d.partnerName || ''].join(' ').toLowerCase(),
      isAdminDeal: isAdmin,
    });
  });

  // Collaterals
  COLLATERALS.forEach(folder => {
    folder.items.forEach(item => {
      items.push({
        type: 'collateral',
        icon: I.fileText,
        title: item.name,
        meta: folder.folder + ' · ' + item.type + ' · ' + item.size,
        view: 'collateral',
        folder: folder.folder,
        mustRead: item.mustRead,
        keywords: (item.name + ' ' + folder.folder + ' ' + item.type).toLowerCase(),
      });
    });
  });

  // Team members (partner only)
  if (!isAdmin) {
    state.team.forEach(m => {
      items.push({
        type: 'team',
        icon: I.users,
        title: m.name,
        meta: m.email + ' · ' + m.role + ' · ' + m.status,
        view: 'team',
        keywords: (m.name + ' ' + m.email + ' ' + m.role).toLowerCase(),
      });
    });
  }

  // Partners (admin only)
  if (isAdmin) {
    getAllPartners().forEach(p => {
      const s = partnerStats(p);
      items.push({
        type: 'partner',
        icon: I.building,
        title: p.name,
        meta: p.tier + ' · ' + p.country + ' · ' + s.deals + ' deals · ' + s.members + ' team',
        view: 'admin-partner-detail',
        partnerId: p.id,
        keywords: (p.name + ' ' + p.tier + ' ' + p.country + ' ' + (p.contact?.name || '') + ' ' + (p.psm || '')).toLowerCase(),
      });
    });
  }

  // Onboarding steps (partner only)
  if (!isAdmin) {
    state.checklist.forEach((step, i) => {
      items.push({
        type: 'onboarding',
        icon: I.checkSquare,
        title: 'Step ' + (i + 1) + ' — ' + step.title,
        meta: step.desc + (step.done ? ' · Completed' : ' · Pending'),
        view: 'onboarding',
        keywords: (step.title + ' ' + step.desc).toLowerCase(),
      });
    });
  }

  return items;
}

function performSearch(q) {
  const query = q.trim().toLowerCase();
  if (!query) return [];
  const idx = buildSearchIndex();
  const results = [];
  idx.forEach(item => {
    const haystack = (item.title + ' ' + item.meta + ' ' + (item.keywords || '')).toLowerCase();
    if (haystack.includes(query)) {
      // simple ranking: title match scores higher than meta match
      let score = 0;
      if (item.title.toLowerCase().includes(query)) score += 100;
      if (item.title.toLowerCase().startsWith(query)) score += 50;
      if ((item.keywords || '').includes(query)) score += 20;
      results.push({ ...item, _score: score });
    }
  });
  results.sort((a, b) => b._score - a._score);
  return results.slice(0, 30); // cap results
}

function groupResults(results) {
  const groups = { page: [], deal: [], partner: [], collateral: [], team: [], onboarding: [] };
  results.forEach(r => { if (groups[r.type]) groups[r.type].push(r); });
  return groups;
}

const TYPE_LABELS = {
  page: 'Navigate to',
  deal: 'Deals',
  partner: 'Partners',
  collateral: 'Collaterals',
  team: 'Team members',
  onboarding: 'Onboarding steps',
};

function highlightMatch(text, query) {
  if (!query) return escapeHtml(text);
  const q = query.toLowerCase();
  const lower = text.toLowerCase();
  const idx = lower.indexOf(q);
  if (idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0, idx)) +
    '<mark class="match">' + escapeHtml(text.slice(idx, idx + query.length)) + '</mark>' +
    escapeHtml(text.slice(idx + query.length));
}

function openSearch() {
  if (!state.auth) return;
  searchQuery = '';
  searchHighlight = 0;
  searchResultsCache = [];
  if (document.getElementById('search-modal')) return; // already open

  const m = document.createElement('div');
  m.className = 'search-backdrop';
  m.id = 'search-modal';
  m.onclick = (e) => { if (e.target === m) closeSearch(); };
  m.innerHTML = renderSearchBody();
  document.body.appendChild(m);
  setTimeout(() => {
    const input = document.getElementById('search-input');
    if (input) input.focus();
  }, 30);
}

function closeSearch() {
  const m = document.getElementById('search-modal');
  if (m) m.remove();
}

function renderSearchBody() {
  return `
    <div class="search-modal" onclick="event.stopPropagation()">
      <div class="search-input-wrap">
        <span class="search-icon">${I.search}</span>
        <input class="search-input" id="search-input" placeholder="Search deals, partners, collaterals, team..." value="${escapeHtml(searchQuery)}" oninput="updateSearch(this.value)" onkeydown="handleSearchKey(event)">
        <span class="kbd" style="cursor:pointer;" onclick="closeSearch()">Esc</span>
      </div>
      <div class="search-results" id="search-results">${renderSearchResults()}</div>
      <div class="search-footer">
        <div style="display:flex;gap:14px;">
          <span><span class="kbd">↑</span> <span class="kbd">↓</span> navigate</span>
          <span><span class="kbd">↵</span> open</span>
          <span><span class="kbd">Esc</span> close</span>
        </div>
        <div>${searchResultsCache.length} result${searchResultsCache.length === 1 ? '' : 's'}</div>
      </div>
    </div>
  `;
}

function renderSearchResults() {
  if (!searchQuery.trim()) {
    return '<div class="search-empty">Start typing to search across the portal.</div>';
  }
  const results = searchResultsCache;
  if (results.length === 0) {
    return '<div class="search-empty">No matches for "' + escapeHtml(searchQuery) + '".</div>';
  }
  const groups = groupResults(results);
  const order = ['page', 'deal', 'partner', 'collateral', 'team', 'onboarding'];
  let html = '';
  let runningIdx = 0;
  order.forEach(type => {
    const items = groups[type];
    if (!items || items.length === 0) return;
    html += '<div class="search-group">';
    html += '<div class="search-group-label">' + TYPE_LABELS[type] + '</div>';
    items.forEach(item => {
      const i = runningIdx++;
      html += `
        <div class="search-result ${i === searchHighlight ? 'highlighted' : ''}" onclick="executeSearchResult(${i})" onmouseenter="searchHighlight=${i}; refreshSearchHighlight();">
          <div class="search-result-icon">${item.icon}</div>
          <div class="search-result-content">
            <div class="search-result-title">${highlightMatch(item.title, searchQuery)}</div>
            <div class="search-result-meta">${highlightMatch(item.meta, searchQuery)}</div>
          </div>
          <div class="search-result-action">${item.type === 'page' ? 'Open' : item.type === 'deal' ? 'View deal' : item.type === 'partner' ? 'View partner' : item.type === 'collateral' ? 'Open folder' : item.type === 'team' ? 'View team' : 'Go'}</div>
        </div>
      `;
    });
    html += '</div>';
  });
  return html;
}

function updateSearch(q) {
  searchQuery = q;
  searchResultsCache = performSearch(q);
  searchHighlight = 0;
  // re-render only the results + footer, keep the input focused
  document.getElementById('search-results').innerHTML = renderSearchResults();
  // also update footer count
  const footer = document.querySelector('.search-footer > div:last-child');
  if (footer) footer.textContent = searchResultsCache.length + ' result' + (searchResultsCache.length === 1 ? '' : 's');
}

function refreshSearchHighlight() {
  document.querySelectorAll('.search-result').forEach((el, i) => {
    el.classList.toggle('highlighted', i === searchHighlight);
  });
}

function handleSearchKey(e) {
  if (e.key === 'Escape') {
    e.preventDefault();
    closeSearch();
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchHighlight = Math.min(searchResultsCache.length - 1, searchHighlight + 1);
    refreshSearchHighlight();
    scrollHighlightedIntoView();
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchHighlight = Math.max(0, searchHighlight - 1);
    refreshSearchHighlight();
    scrollHighlightedIntoView();
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (searchResultsCache.length > 0) {
      executeSearchResult(searchHighlight);
    }
    return;
  }
}

function scrollHighlightedIntoView() {
  const el = document.querySelector('.search-result.highlighted');
  if (el) el.scrollIntoView({ block: 'nearest' });
}

function executeSearchResult(idx) {
  const item = searchResultsCache[idx];
  if (!item) return;
  closeSearch();

  if (item.type === 'page') {
    navigate(item.view);
  } else if (item.type === 'deal') {
    if (item.isAdminDeal) {
      // Admin clicking a deal from a partner — go to that partner's detail
      if (item.partnerId) {
        openPartner(item.partnerId);
      } else {
        navigate('admin-deals');
      }
    } else {
      // Partner viewing own deal — open the deal detail
      openDeal(item.dealId);
    }
  } else if (item.type === 'partner') {
    openPartner(item.partnerId);
  } else if (item.type === 'collateral') {
    state.activeFolder = item.folder;
    saveState();
    navigate('collateral');
  } else if (item.type === 'team') {
    navigate('team');
  } else if (item.type === 'onboarding') {
    navigate('onboarding');
  }
}

// Global keyboard listener for Cmd/Ctrl+K
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
    if (state.auth) {
      e.preventDefault();
      openSearch();
    }
  }
  if (e.key === '/' && state.auth && !document.getElementById('search-modal')) {
    // also support '/' shortcut when not in an input
    const active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT')) return;
    e.preventDefault();
    openSearch();
  }
});

/* ============================================================
   MAIN RENDER
   ============================================================ */
function render() {
  const app = document.getElementById('app');
  if (!state.auth) {
    app.innerHTML = renderLogin();
    return;
  }
  let body = '';
  switch(state.view) {
    case 'dashboard': body = renderDashboard(); break;
    case 'onboarding': body = renderOnboarding(); break;
    case 'leads': body = renderLeads(); break;
    case 'collateral': body = renderCollateral(); break;
    case 'team': body = renderTeam(); break;
    case 'admin': body = renderAdmin(); break;
    case 'admin-deals': body = renderAdminDeals(); break;
    case 'admin-partners': body = renderAdminPartners(); break;
    case 'admin-partner-detail': body = renderAdminPartnerDetail(); break;
    default: body = renderDashboard();
  }
  app.innerHTML = renderShell(body);
}

render();
</script>
</body>
</html>
