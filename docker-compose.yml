version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: assetzentri_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: assetzentri
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assetzentri"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Express API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetzentri_backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/assetzentri
      JWT_SECRET: supersecretkey_change_in_production
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5173"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    # Runs setup (idempotent) on every start, then launches the server
    command: sh -c "npm run setup && npm start"

  # ── React Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: assetzentri_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
